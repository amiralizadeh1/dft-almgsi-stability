# Copy this file to config/convergence.yaml and replace placeholders before use.
# Generation writes inputs only; it does not launch calculations.
profile: convergence
pseudopotentials:
  pseudo_dir: pseudos
  files:
    Al: Al.us.pbe.z_3.ld1.psl.v1.0.0-low.upf
    Mg: Mg.us.pbe.z_10.uspp.gbrv.v1.4.upf
    Si: Si.us.pbe.z_4.ld1.psl.v1.0.0-high.upf
settings:
  qe_command: pw.x
  pseudo_dir: pseudos
  input_dft: PBE
  occupations: smearing
  smearing: mv
  degauss_ry: 0.02
  si_occupations: fixed
  conv_thr: 1.0e-8
  forc_conv_thr: 1.0e-4
  press_conv_thr: 0.5
  electron_maxstep: 100
  disk_io: low
  tstress: true
  tprnfor: true
  shell_tolerance_angstrom: 0.03
convergence:
  cutoff_fixed_kpoints: [8, 8, 8]
  cutoff_values_ry: [30, 40, 50, 60]
  kpoint_fixed_ecutwfc_ry: 50
  kpoint_fixed_ecutrho_ry: 400
  kpoint_grids: [[4, 4, 4], [6, 6, 6], [8, 8, 8]]
  example_energy_threshold_ev_per_atom: 0.001
  smearing_sensitivity: []
  supercell_size_comparison: []
cases:
  include_elemental_refs: true
  include_defects: false
  include_convergence: true
